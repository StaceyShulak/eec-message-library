<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach Message Library — E+E Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
<style>
  :root{
    --ink:#0a0a0a;
    --mid:#3a3a3a;
    --light:#7a7a7a;
    --bg:#f7f7f7;
    --subtle:#ebebeb;
    --border:#d8d8d8;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:'Libre Baskerville',serif;}

  header{
    position:sticky; top:0; z-index:20;
    background:var(--white);
    border-bottom:1px solid var(--border);
    padding:18px 28px;
    display:flex; align-items:baseline; justify-content:space-between;
    flex-wrap:wrap; gap:8px;
  }
  header .brand{display:flex; align-items:baseline; gap:12px;}
  header h1{font-size:19px; font-weight:700; margin:0; letter-spacing:.2px;}
  header .tag{font-size:12px; color:var(--light); font-family:'Inter'; text-transform:uppercase; letter-spacing:1.2px;}
  header .status{font-size:11px; color:var(--light); text-transform:uppercase; letter-spacing:1.5px; display:flex; align-items:center; gap:6px;}
  .dot{width:7px; height:7px; border-radius:50%; background:#2f6f45; display:inline-block;}
  .dot.err{background:#a23c3c;}
  .dot.loading{background:#c9a227;}

  .shell{
    max-width:1240px; margin:0 auto; padding:24px 28px 64px;
    display:grid; grid-template-columns:340px 1fr; gap:24px;
  }
  @media (max-width:860px){ .shell{grid-template-columns:1fr;} }

  .sidebar{position:relative;}
  .search{
    width:100%; padding:11px 14px; font-size:13.5px; font-family:'Inter';
    border:1px solid var(--border); background:var(--white); color:var(--ink);
    margin-bottom:14px; border-radius:2px;
  }
  .search:focus{outline:none; border-color:var(--ink);}

  .tabs{display:flex; gap:4px; margin-bottom:0;}
  .tab{
    flex:1; text-align:center; padding:9px 6px 8px;
    font-size:11.5px; letter-spacing:.6px; text-transform:uppercase;
    font-weight:600; color:var(--light); cursor:pointer;
    background:var(--subtle);
    border:1px solid var(--border); border-bottom:none;
    border-radius:5px 5px 0 0;
    position:relative; top:1px;
    transition:background .15s, color .15s;
  }
  .tab.active{ background:var(--white); color:var(--ink); }
  .tab:hover:not(.active){ background:#e2e2e2; }

  .list-wrap{
    background:var(--white); border:1px solid var(--border);
    border-radius:0 5px 5px 5px;
    max-height:calc(100vh - 268px); overflow-y:auto;
  }
  .count-row{
    padding:10px 14px; font-size:11px; color:var(--light);
    border-bottom:1px solid var(--subtle); text-transform:uppercase; letter-spacing:1px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .new-tpl-btn{
    font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink);
    cursor:pointer; font-weight:700; border:none; background:none; padding:0;
  }
  .new-tpl-btn:hover{ text-decoration:underline; }
  .tpl-card{
    padding:13px 14px; border-bottom:1px solid var(--subtle);
    cursor:pointer; transition:background .12s;
  }
  .tpl-card:last-child{border-bottom:none;}
  .tpl-card:hover{background:var(--bg);}
  .tpl-card.active{background:var(--ink); }
  .tpl-card.active .tpl-name{color:var(--white);}
  .tpl-card.active .tpl-purpose{color:#c7c7c7;}
  .tpl-card.active .badge{border-color:#555; color:#ddd;}
  .tpl-name{font-size:13.5px; font-weight:600; margin:0 0 3px;}
  .tpl-purpose{font-size:12px; color:var(--light); line-height:1.4; margin:0 0 6px;}
  .badge{
    display:inline-block; font-size:9.5px; letter-spacing:.8px; text-transform:uppercase;
    padding:2px 7px; border:1px solid var(--border); border-radius:20px; color:var(--light);
  }
  .badge.custom{ border-color:#8a6d3b; color:#8a6d3b; }
  .tpl-card.active .badge.custom{ border-color:#d9b876; color:#d9b876; }

  .restore-row{ text-align:center; margin-top:10px; }
  .restore-row button{
    font-size:11px; color:var(--light); background:none; border:none; cursor:pointer;
    text-decoration:underline; font-family:'Inter';
  }
  .restore-row button:hover{ color:var(--ink); }

  .panel{background:var(--white); border:1px solid var(--border); border-radius:5px; padding:28px 30px;}
  .panel-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px;}
  .panel-eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--light); margin:0 0 6px;}
  .panel h2{font-size:24px; margin:0 0 6px;}
  .panel .purpose{font-size:14px; color:var(--mid); margin:0 0 22px; max-width:640px;}
  .panel-actions{display:flex; gap:8px; flex-shrink:0; padding-top:2px;}
  .icon-btn{
    font-size:12px; font-weight:600; color:var(--mid); background:var(--white);
    border:1px solid var(--border); border-radius:3px; padding:7px 13px; cursor:pointer;
    font-family:'Inter'; transition:background .12s;
  }
  .icon-btn:hover{ background:var(--bg); }
  .icon-btn.danger{ color:#a23c3c; border-color:#e3c4c4; }
  .icon-btn.danger:hover{ background:#fbe7e7; }

  .fields{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:14px 16px; margin-bottom:22px;
  }
  .field label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--light); margin-bottom:5px;
  }
  .field input, .field select, .field textarea{
    width:100%; padding:9px 10px; font-size:13.5px; font-family:'Inter';
    border:1px solid var(--border); border-radius:2px; background:var(--bg); color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--ink); background:var(--white);}

  .preview-label{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;
  }
  .preview-label span{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--light);}
  .preview{
    white-space:pre-wrap; word-wrap:break-word;
    background:var(--bg); border:1px solid var(--border); border-radius:3px;
    padding:18px 20px; font-size:14px; line-height:1.65; color:var(--ink);
    min-height:140px; font-family:'Inter';
  }
  .preview .missing{
    background:#fbe7e7; color:#a23c3c; border-radius:2px; padding:0 3px;
  }
  .actions{display:flex; align-items:center; gap:12px; margin-top:16px;}
  button.copy{
    background:var(--ink); color:var(--white); border:none; border-radius:3px;
    padding:11px 22px; font-size:13px; font-weight:600; letter-spacing:.3px;
    cursor:pointer; font-family:'Inter'; transition:opacity .15s;
  }
  button.copy:hover{opacity:.85;}
  button.copy.copied{background:#2f6f45;}
  .char-count{font-size:11.5px; color:var(--light);}

  .edit-form .field{margin-bottom:16px;}
  .edit-grid{display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:4px;}
  .edit-form textarea{
    min-height:220px; font-family:'Inter'; line-height:1.6; resize:vertical;
  }
  .field-hint{font-size:11.5px; color:var(--light); margin:6px 0 0; line-height:1.5;}
  .field-hint code{background:var(--subtle); padding:1px 5px; border-radius:2px; font-size:11px;}
  .edit-actions{display:flex; gap:10px; margin-top:18px; align-items:center;}
  button.save{
    background:var(--ink); color:var(--white); border:none; border-radius:3px;
    padding:11px 22px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter';
  }
  button.save:hover{opacity:.85;}
  button.save:disabled{opacity:.5; cursor:default;}
  button.cancel{
    background:var(--white); color:var(--mid); border:1px solid var(--border); border-radius:3px;
    padding:11px 20px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter';
  }
  button.cancel:hover{ background:var(--bg); }
  .save-msg{ font-size:12px; color:#2f6f45; font-weight:600; }
  .error-msg{ font-size:12px; color:#a23c3c; font-weight:600; }

  .empty-state{
    display:flex; align-items:center; justify-content:center; height:100%;
    min-height:320px; color:var(--light); font-size:14px; text-align:center; flex-direction:column; gap:10px;
  }
  .empty-state .serif{font-size:18px; color:var(--mid);}
  .empty-state button{ margin-top:6px; }

  footer{
    text-align:center; padding:26px 20px 40px; color:var(--light); font-size:11.5px;
    letter-spacing:.4px;
  }
  footer a{color:var(--mid); text-decoration:none; border-bottom:1px dotted var(--border);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Outreach Message Library</h1>
    <span class="tag">Recruiting &amp; Business Development</span>
  </div>
  <span class="status" id="statusLine"><span class="dot loading" id="statusDot"></span><span id="statusText">Loading…</span></span>
</header>

<div class="shell">
  <div class="sidebar">
    <input type="text" class="search" id="searchBox" placeholder="Search templates…">
    <div class="tabs" id="tabs"></div>
    <div class="list-wrap">
      <div class="count-row">
        <span id="countLabel"></span>
        <button class="new-tpl-btn" id="newTplBtn">+ New template</button>
      </div>
      <div id="tplList"></div>
    </div>
    <div class="restore-row">
      <button id="restoreBtn">Restore original template library</button>
    </div>
  </div>

  <div class="panel" id="panel">
    <div class="empty-state">
      <div class="serif">Loading your message library…</div>
    </div>
  </div>
</div>

<footer>
  E+E Consultation (9401-9387 Quebec Inc.) · <a href="https://eeconsulting-consultation.com" target="_blank">eeconsulting-consultation.com</a>
</footer>

<script src="app.js"></script>
</body>
</html>
