<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEC Message Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    #templates-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .template-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .template-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .template-card h3 {
      color: #667eea;
      margin-bottom: 8px;
      font-size: 1.2em;
    }

    .template-card .category {
      display: inline-block;
      background: #e8eaf6;
      color: #667eea;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .template-card .purpose {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 12px;
      font-style: italic;
    }

    .template-body {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 0.95em;
      line-height: 1.6;
      color: #333;
      max-height: 150px;
      overflow-y: auto;
      border-left: 4px solid #667eea;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:nth-child(1) {
      background: #667eea;
      color: white;
    }

    button:nth-child(1):hover {
      background: #5568d3;
    }

    button:nth-child(2) {
      background: #48bb78;
      color: white;
    }

    button:nth-child(2):hover {
      background: #38a169;
    }

    button:nth-child(3) {
      background: #f56565;
      color: white;
    }

    button:nth-child(3):hover {
      background: #e53e3e;
    }

    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
    }

    @media (max-width: 768px) {
      #templates-list {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 EEC Message Library</h1>
      <p>Real-time template management with cross-device sync</p>
    </header>

    <div id="templates-list"></div>
  </div>

  <!-- Firebase SDK (loaded from CDN) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>

  <!-- Load Firebase config BEFORE app.js -->
  <script src="firebase-config.js"></script>

  <!-- Application code -->
  <script src="app.js"></script>
</body>
</html>
