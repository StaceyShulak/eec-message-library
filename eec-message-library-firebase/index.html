<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEC Message Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    #templates-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .template-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s;
    }

    .template-card:hover {
      transform: translateY(-5px);
    }

    .template-card h3 {
      color: #667eea;
      margin-bottom: 8px;
    }

    .template-card .category {
      display: inline-block;
      background: #e8eaf6;
      color: #667eea;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      margin-bottom: 10px;
    }

    .template-body {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 0.95em;
      max-height: 150px;
      overflow-y: auto;
      border-left: 4px solid #667eea;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.9em;
      cursor: pointer;
    }

    button:nth-child(1) {
      background: #667eea;
      color: white;
    }

    button:nth-child(2) {
      background: #48bb78;
      color: white;
    }

    button:nth-child(3) {
      background: #f56565;
      color: white;
    }

    #loading {
      text-align: center;
      color: white;
      margin-top: 50px;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 EEC Message Library</h1>
      <p>Real-time template management with cross-device sync</p>
    </header>

    <div id="loading">Loading templates...</div>
    <div id="templates-list"></div>
  </div>

  <!-- Load config first -->
  <script src="firebase-config.js"></script>

  <!-- Firebase SDK (compat version for script tag loading) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

  <!-- Application code -->
  <script src="app.js"></script>
</body>
</html>
